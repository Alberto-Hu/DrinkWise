[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

# Dependencias instaladas automáticamente por PlatformIO
lib_deps =
    adafruit/Adafruit GFX Library @ ^1.11.9
    adafruit/Adafruit SSD1306 @ ^2.5.9
    adafruit/Adafruit NeoPixel @ ^1.12.0
    bogde/HX711 @ ^0.7.5
